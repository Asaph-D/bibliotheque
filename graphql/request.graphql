## GraphiQL
# http://localhost:8080/graphiql

# [1] OVER-FETCHING (GraphQL)
# Ici, GraphQL peut aussi "over-fetch" si le client demande trop de champs.
# OVER-FETCHING
query { 
  livres(genre: ROMAN, disponible: true) { 
    id 
    titre 
    disponible 
  } 
}

# [2] UNDER-FETCHING (GraphQL)
# Exemple agrégé: tout en 1 requête (évite les multi-appels REST).
# UNDER-FETCHING
query { 
  livres { 
    titre 
    auteur { nom nationalite } 
    empruntsActifs { dateRetourPrevue adherent { nom } } 
  } 
} 

# [3] MUTATION (GraphQL) — emprunter un livre
# MUTATION
mutation {
  emprunterLivre(livreId: "1", adherentId: "10") {
    id
    dateRetourPrevue
    livre { titre }
  }
}

# [4] SUBSCRIPTION (GraphQL)
# SUBSCRIPTION
subscription {
  livreDisponible(genre: ROMAN) {
    titre
    auteur { nom }
  }
}
# Puis effectuez un retour de livre pour voir la notification en temps reel

